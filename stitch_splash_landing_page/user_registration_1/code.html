<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Play or Pay - Create Account</title>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Plus+Jakarta+Sans:wght@400;500;700;800" onload="this.rel='stylesheet'" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ea2a2a",
            "background-light": "#f8f6f6",
            "background-dark": "#211111",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-zinc-900 dark:text-zinc-200">
<div class="relative flex h-auto min-h-screen w-full flex-col">
<div class="flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-primary/20 px-10 py-4">
<div class="flex items-center gap-3 text-zinc-900 dark:text-white">
<div class="size-6 text-primary">
<svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M12.0799 24L4 19.2479L9.95537 8.75216L18.04 13.4961L18.0446 4H29.9554L29.96 13.4961L38.0446 8.75216L44 19.2479L35.92 24L44 28.7521L38.0446 39.2479L29.96 34.5039L29.9554 44H18.0446L18.04 34.5039L9.95537 39.2479L4 28.7521L12.0799 24Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-xl font-bold">Play or Pay</h2>
</div>
<nav class="flex items-center gap-8">
<a class="text-sm font-medium text-zinc-600 dark:text-zinc-300 hover:text-primary dark:hover:text-primary transition-colors" href="#">Home</a>
<a class="text-sm font-medium text-zinc-600 dark:text-zinc-300 hover:text-primary dark:hover:text-primary transition-colors" href="#">Challenges</a>
<a class="text-sm font-medium text-zinc-600 dark:text-zinc-300 hover:text-primary dark:hover:text-primary transition-colors" href="#">Blog</a>
<a class="text-sm font-medium text-zinc-600 dark:text-zinc-300 hover:text-primary dark:hover:text-primary transition-colors" href="#">Messages</a>
</nav>
<button class="rounded-lg bg-primary/10 dark:bg-primary/20 px-4 py-2 text-sm font-bold text-primary hover:bg-primary/20 dark:hover:bg-primary/30 transition-colors">Log In</button>
</header>
<main class="flex flex-1 items-center justify-center py-12">
<div class="w-full max-w-md rounded-xl bg-white dark:bg-zinc-900/50 p-8 shadow-lg shadow-primary/5">
<div class="text-center">
<h1 class="text-3xl font-bold text-zinc-900 dark:text-white">Create your account</h1>
<p class="mt-2 text-sm text-zinc-600 dark:text-zinc-400">Join the fun! Let the games begin.</p>
</div>
<form class="mt-8 space-y-6">
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300" for="full-name">Full Name</label>
<div class="mt-1">
<input class="form-input block w-full rounded-lg border-zinc-300 dark:border-zinc-700 bg-background-light dark:bg-background-dark py-3 px-4 placeholder-zinc-400 dark:placeholder-zinc-500 focus:border-primary focus:ring-primary" id="full-name" name="full-name" placeholder="Enter your full name" required="" type="text"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300" for="email">Email address</label>
<div class="mt-1">
<input autocomplete="email" class="form-input block w-full rounded-lg border-zinc-300 dark:border-zinc-700 bg-background-light dark:bg-background-dark py-3 px-4 placeholder-zinc-400 dark:placeholder-zinc-500 focus:border-primary focus:ring-primary" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300" for="phone-number">Phone Number</label>
<div class="mt-1">
<input class="form-input block w-full rounded-lg border-zinc-300 dark:border-zinc-700 bg-background-light dark:bg-background-dark py-3 px-4 placeholder-zinc-400 dark:placeholder-zinc-500 focus:border-primary focus:ring-primary" id="phone-number" name="phone-number" placeholder="Enter your phone number" required="" type="tel"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300" for="password">Password</label>
<div class="mt-1">
<input autocomplete="new-password" class="form-input block w-full rounded-lg border-zinc-300 dark:border-zinc-700 bg-background-light dark:bg-background-dark py-3 px-4 placeholder-zinc-400 dark:placeholder-zinc-500 focus:border-primary focus:ring-primary" id="password" name="password" placeholder="Create a password" required="" type="password"/>
</div>
</div>
</div>
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all" type="submit">
                Sign Up
              </button>
</div>
</form>
<p class="mt-6 text-center text-sm text-zinc-600 dark:text-zinc-400">
            Already have an account?
            <a class="font-medium text-primary hover:text-primary/80" href="#">
              Log in
            </a>
</p>
</div>
</main>
</div>
</div>

</body></html>
