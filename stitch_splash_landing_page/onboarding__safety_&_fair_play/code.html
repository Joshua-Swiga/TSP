<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Stitch Design</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              display: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
<style>
      .custom-checkbox:checked {
        background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
      }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="flex h-screen items-center justify-center">
<div class="flex w-full max-w-lg flex-col items-center rounded-xl bg-white dark:bg-background-dark shadow-lg">
<div class="relative w-full p-8 text-center">
<button class="absolute right-4 top-4 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300">
<span class="material-symbols-outlined"> close </span>
</button>
<div class="mx-auto mb-4 flex size-12 items-center justify-center rounded-full bg-red-100 dark:bg-red-900/30">
<span class="material-symbols-outlined text-red-500 dark:text-red-400" style="font-size: 32px; font-variation-settings: 'FILL' 1;"> security </span>
</div>
<h2 class="text-2xl font-bold text-gray-900 dark:text-white">Safety &amp; Fair Play</h2>
<p class="mt-2 text-gray-600 dark:text-gray-300">
            We're committed to creating a fun and respectful environment. Here's
            how we ensure fair play and safety:
          </p>
</div>
<div class="w-full space-y-4 px-8">
<label class="flex items-start space-x-3">
<input class="custom-checkbox mt-1 h-5 w-5 shrink-0 appearance-none rounded border-2 border-gray-300 dark:border-gray-600 bg-transparent checked:border-primary checked:bg-primary focus:outline-none focus:ring-0" type="checkbox"/>
<span class="text-sm text-gray-700 dark:text-gray-300">
<span class="font-semibold text-gray-900 dark:text-white">Respectful Gameplay:</span>
              Treat all players with respect. Harassment, hate speech, or any
              form of abuse will not be tolerated.
            </span>
</label>
<label class="flex items-start space-x-3">
<input class="custom-checkbox mt-1 h-5 w-5 shrink-0 appearance-none rounded border-2 border-gray-300 dark:border-gray-600 bg-transparent checked:border-primary checked:bg-primary focus:outline-none focus:ring-0" type="checkbox"/>
<span class="text-sm text-gray-700 dark:text-gray-300">
<span class="font-semibold text-gray-900 dark:text-white">Fair Challenges:</span>
              Challenges should be clear, achievable, and agreed upon by both
              players.
            </span>
</label>
<label class="flex items-start space-x-3">
<input class="custom-checkbox mt-1 h-5 w-5 shrink-0 appearance-none rounded border-2 border-gray-300 dark:border-gray-600 bg-transparent checked:border-primary checked:bg-primary focus:outline-none focus:ring-0" type="checkbox"/>
<span class="text-sm text-gray-700 dark:text-gray-300">
<span class="font-semibold text-gray-900 dark:text-white">Token Transfers:</span>
              If a challenge is failed, tokens must be transferred promptly.
              Refusal will result in suspension.
            </span>
</label>
<label class="flex items-start space-x-3">
<input class="custom-checkbox mt-1 h-5 w-5 shrink-0 appearance-none rounded border-2 border-gray-300 dark:border-gray-600 bg-transparent checked:border-primary checked:bg-primary focus:outline-none focus:ring-0" type="checkbox"/>
<span class="text-sm text-gray-700 dark:text-gray-300">
<span class="font-semibold text-gray-900 dark:text-white">Anonymous Play:</span>
              You have the option to remain completely anonymous while playing.
            </span>
</label>
</div>
<div class="flex w-full justify-between gap-4 p-8">
<button class="w-full rounded-lg bg-gray-200 dark:bg-gray-700 px-4 py-2.5 font-semibold text-gray-800 dark:text-white transition-colors hover:bg-gray-300 dark:hover:bg-gray-600">
            Previous
          </button>
<button class="w-full rounded-lg bg-primary px-4 py-2.5 font-semibold text-white transition-opacity hover:opacity-90">
            Done
          </button>
</div>
</div>
</div>

</body></html>
